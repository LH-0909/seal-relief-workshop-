<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="rough-edge">
      <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <!-- 外边框 -->
  <rect x="30" y="30" width="140" height="140" rx="4" ry="4"
        fill="none" stroke="#c0392b" stroke-width="5" filter="url(#rough-edge)"/>
  <!-- 内边框 -->
  <rect x="45" y="45" width="110" height="110" rx="2" ry="2"
        fill="none" stroke="#c0392b" stroke-width="1.5" filter="url(#rough-edge)"/>
  <!-- 文字区域 -->
  <text x="100" y="95" text-anchor="middle" dominant-baseline="central"
        font-family="serif" font-size="42" font-weight="bold"
        fill="#c0392b" filter="url(#rough-edge)">印</text>
  <text x="100" y="135" text-anchor="middle" dominant-baseline="central"
        font-family="serif" font-size="28" font-weight="normal"
        fill="#c0392b" filter="url(#rough-edge)">章</text>
</svg>
