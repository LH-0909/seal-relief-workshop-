<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <filter id="seal-noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <!-- 外边框 -->
  <rect x="35" y="35" width="230" height="230" rx="8" ry="8"
        fill="none" stroke="#c0392b" stroke-width="8" filter="url(#seal-noise)"/>
  <!-- 内边框 -->
  <rect x="58" y="58" width="184" height="184" rx="4" ry="4"
        fill="none" stroke="#c0392b" stroke-width="2.5" filter="url(#seal-noise)"/>
  <!-- 中心文字 -->
  <text x="150" y="142" text-anchor="middle" dominant-baseline="central"
        font-family="serif" font-size="72" font-weight="700"
        fill="#c0392b" filter="url(#seal-noise)">印</text>
  <text x="150" y="210" text-anchor="middle" dominant-baseline="central"
        font-family="serif" font-size="44" font-weight="500"
        fill="#c0392b" filter="url(#seal-noise)">章</text>
</svg>
